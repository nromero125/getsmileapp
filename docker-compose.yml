services:

  # ── PHP-FPM ────────────────────────────────
  app:
    build:
      context: .
      target: app
    image: dentaris_app          # ← nombra la imagen para que worker/scheduler la reusen
    container_name: dentaris_app
    restart: unless-stopped
    entrypoint: ["entrypoint.sh"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage
      - app_cache:/var/www/html/bootstrap/cache
      - app_public:/var/www/html/public
    env_file: .env
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
    healthcheck:
      test:
        [
          "CMD",
          "php",
          "-r",
          "$$socket = @fsockopen('127.0.0.1', 9000); exit($$socket ? 0 : 1);",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 45s
    networks:
      - dentaris

  # ── Nginx ──────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: dentaris_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app_public:/var/www/html/public:ro
      - app_storage:/var/www/html/storage:ro
      - nginx_certs:/etc/nginx/certs:ro
    networks:
      - dentaris

  # ── Queue Worker ───────────────────────────
  worker:
    image: dentaris_app          # ← reutiliza la imagen ya construida
    container_name: dentaris_worker
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600 --memory=256
    depends_on:
      - app
    volumes:
      - app_storage:/var/www/html/storage
    env_file: .env
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
    networks:
      - dentaris

  # ── Scheduler ──────────────────────────────
  scheduler:
    image: dentaris_app          # ← reutiliza la imagen ya construida
    container_name: dentaris_scheduler
    restart: unless-stopped
    command: >
      sh -c "while true; do
        php artisan schedule:run --no-interaction;
        sleep 60;
      done"
    depends_on:
      - app
    volumes:
      - app_storage:/var/www/html/storage
    env_file: .env
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
    networks:
      - dentaris

  # ── MySQL 8 ────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: dentaris_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-dentaris}
      MYSQL_USER: ${DB_USERNAME:-dentaris}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dentaris

  # ── Redis ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: dentaris_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - dentaris

networks:
  dentaris:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  app_storage:
  app_cache:
  app_public:
  nginx_certs:
